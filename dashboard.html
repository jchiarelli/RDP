<script>
// Função getter dinâmica para acessar D quando dados estiverem prontos
function getD() { return window.D; }
// Compatibilidade - referencia D como getter
Object.defineProperty(window, 'D_compat', {
  get: function() { return window.D; }
});
const $ = id => document.getElementById(id);
// Compatibilidade global para templates antigos que referenciam metaDiariaGeral
if(typeof globalThis.metaDiariaGeral === 'undefined') globalThis.metaDiariaGeral = 95;

function fmtDate(iso){
  if(!iso) return '-';
  const s = String(iso).slice(0,10);
  const m = s.match(/(\d{4})-(\d{2})-(\d{2})/);
  return m ? `${m[3]}/${m[2]}/${m[1]}` : s;
}
function diasUteisNoPeriodo(de, ate){
  const out = [];
  if(!de || !ate) return out;
  const d = new Date(de);
  const fim = new Date(ate);
  while(d <= fim){
    const dow = d.getUTCDay();
    if(dow >= 1 && dow <= 5) out.push(d.toISOString().slice(0,10));
    d.setUTCDate(d.getUTCDate()+1);
  }
  return out;
}
function escHtml(s){ return String(s||'').replace(/[<>&"]/g, c=>({"<":"&lt;",">":"&gt;","&":"&amp;",'"':"&quot;"}[c])); }

document.querySelectorAll('.nav-item[data-tab]').forEach(n => {
  n.onclick = () => {
    document.querySelectorAll('.nav-item').forEach(x=>x.classList.remove('active'));
    n.classList.add('active');
    document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
    const id = n.dataset.tab;

      gestao:['Gestão de Pessoas','Convergint · Acompanhamento de RDP'],
      metas:['Metas','Configurar metas de RDP por colaborador']
    };
    if(titles[id]){ $('pageTitle').textContent=titles[id][0]; $('pageSub').textContent=titles[id][1]; }
    // Re-render quando a aba é clicada
    try{
      if(id==='overview') renderOverview();
      else if(id==='status') renderStatus();
      else if(id==='equipe') renderEquipe();

      else if(id==='metas') renderMetas();
    }catch(e){
      console.error('Erro ao renderizar aba '+id+':', e);
    }
  };
});

function toggleTheme(){
  const cur = document.documentElement.getAttribute('data-theme') || 'light';
  const nxt = cur==='light'?'dark':'light';
  document.documentElement.setAttribute('data-theme', nxt);
  try{ localStorage.setItem('rdp-theme', nxt); }catch(e){}
}
function abrirRDP(data, arquivo){
  // Abre o arquivo RDP localmente
  // Nota: navegadores bloqueiam file:// por segurança, então mostramos o caminho
  if(!data || !arquivo) return;

  // Se arquivo é array, processa especialmente
  let arquivos = Array.isArray(arquivo) ? arquivo : [arquivo];

  // Se múltiplos arquivos, mostra lista para o usuário escolher
  if(arquivos.length > 1){
    const lista = arquivos.map((f, i) => `${i+1}. ${f}`).join('\n');
    const escolha = prompt(`Múltiplos arquivos encontrados:\n\n${lista}\n\nDigite o número (1-${arquivos.length}) ou deixe em branco para cancelar:`, '1');
    if(!escolha || isNaN(parseInt(escolha))) return;
    const idx = parseInt(escolha) - 1;
    if(idx < 0 || idx >= arquivos.length) return;
    arquivo = arquivos[idx];
  } else {
    arquivo = arquivos[0];
  }

  const dataStr = data.slice(0,10); // YYYY-MM-DD
  const baseDir = 'C:\\Users\\Joao.Chiarelli\\OneDrive - Convergint\\Claude\\Acompanhamento de projeto\\RDP';
  const fullPath = `${baseDir}\\${dataStr}\\${arquivo}`;

  // Tenta abrir via file:// protocol (navegadores modernos bloqueiam)
  const filePath = `file:///${fullPath.replace(/\\/g, '/').replace(/ /g, '%20')}`;
  const opened = window.open(filePath, '_blank');

  // Se navegador bloqueou, mostra o caminho para o usuário copiar
  if(!opened || opened.closed || typeof opened.closed === 'undefined'){
    alert('Caminho do arquivo:\n\n' + fullPath + '\n\nO navegador bloqueou a abertura. Copie o caminho acima e abra no Explorador de Arquivos.');
  }
}
function construirCaminhoRDP(data, arquivo){
  // Versão anterior (mantida para compatibilidade)
  if(!data || !arquivo) return null;
  const dataStr = data.slice(0,10); // YYYY-MM-DD
  const baseDir = 'C:/Users/Joao.Chiarelli/OneDrive - Convergint/Claude/Acompanhamento de projeto/RDP';
  const fullPath = `${baseDir}/${dataStr}/${arquivo}`.replace(/ /g, '%20');
  return `file:///${fullPath}`;
}
function exportarTudo(){
  if(!window.D){ alert('Sem dados.'); return; }
  const b = new Blob([JSON.stringify(window.D,null,2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(b); a.download = 'rdp_export.json';

// ── Funções de Filtro Genéricos ────────────────────────────────────────
/**
 * Filtra RDPs por critério genérico
 * @param {Object} criteria - Objeto com propriedades de filtro
 * @returns {Array} RDPs filtrados
 */
function filterRDPs(criteria = {}) {
  if (!window.D || !window.D.rdps) return [];

  let filtered = window.D.rdps;

  // Filtro por data
  if (criteria.date) {
    filtered = filtered.filter(rdp => rdp.data === criteria.date);
  }

  // Filtro por código de projeto (pode ser string ou array)
  if (criteria.projectCode) {
    filtered = filtered.filter(rdp => {
      const codigo = rdp.projeto_codigo;
      if(Array.isArray(codigo)){
        return codigo.includes(criteria.projectCode);
      } else {
        return codigo === criteria.projectCode;
      }
    });
  }

  // Filtro por equipe
  if (criteria.team) {
    filtered = filtered.filter(rdp => rdp.equipe === criteria.team);
  }

  // Filtro por responsável
  if (criteria.responsavel) {
    filtered = filtered.filter(rdp => rdp.responsavel === criteria.responsavel);
  }

  // Filtro por busca de texto (em arquivo, projeto_nome, responsavel)
  if (criteria.search) {
    const searchLower = criteria.search.toLowerCase();
    filtered = filtered.filter(rdp => {
      // Verifica arquivo (pode ser string ou array)
      let arquivoMatch = false;
      if(rdp.arquivo){
        if(Array.isArray(rdp.arquivo)){
          arquivoMatch = rdp.arquivo.some(f => f.toLowerCase().includes(searchLower));
        } else {
          arquivoMatch = rdp.arquivo.toLowerCase().includes(searchLower);
        }
      }

      // Verifica projeto_nome (pode ser string ou array)
      let nomeMatch = false;
      if(rdp.projeto_nome){
        if(Array.isArray(rdp.projeto_nome)){
          nomeMatch = rdp.projeto_nome.some(n => n.toLowerCase().includes(searchLower));
        } else {
          nomeMatch = rdp.projeto_nome.toLowerCase().includes(searchLower);
        }
      }

      return arquivoMatch || nomeMatch || (rdp.responsavel && rdp.responsavel.toLowerCase().includes(searchLower));
    });
  }

  return filtered;
}

/**
 * Obtém lista única de valores para um campo do conjunto de RDPs
 * Flattens arrays para extrair valores únicos
 * @param {String} field - Nome do campo
 * @returns {Array} Array de valores únicos e ordenados
 */
function getDistinctValues(field) {
  if (!window.D || !window.D.rdps) return [];
  const values = [];
  window.D.rdps.forEach(rdp => {
    const val = rdp[field];
    if(val){
      if(Array.isArray(val)){
        values.push(...val);
      } else {
        values.push(val);
      }
    }
  });
  return [...new Set(values)].sort();
}

function pessoaNoRDP(pessoa, r){
  // Proteção contra valores undefined
  if(!pessoa || !r) return false;

  // DEBUG: Log para o RDP específico
  if(r.nome && r.nome.includes('PRJ22499') && r.nome.includes('Noélio')) {
    console.log('🔍 DEBUG PRJ22499 - Verificando pessoa:', pessoa.nome, 'contra RDP:', {
      responsavel: r.responsavel,
      email: r.email,
      participantes: r.participantes,
      participantes_raw: JSON.stringify(r.participantes)
    });
  }

  // Verifica se a pessoa está na lista de exclusão para este RDP
  const excluidos = r.participantes_excluir || [];
  if(pessoa.email && excluidos.includes(pessoa.email.toLowerCase())) return false;

  // Confere responsavel principal
  if(pessoa.email && r.email===pessoa.email) return true;
  if(pessoa.nome && (r.responsavel||'').toLowerCase()===pessoa.nome.toLowerCase()) return true;
  // Confere participantes (todos que trabalharam no dia, mesmo que nao tenham assinado o arquivo)
  let parts = r.participantes || [];

  // Se participantes é string JSON, faz parse
  if(typeof parts === 'string') {
    try {
      parts = JSON.parse(parts);
    } catch(e) {
      // Se falhar, trata como array vazio
      parts = [];
    }
  }

  // Garante que é array
  if(!Array.isArray(parts)) {
    parts = [];
  }

  // DEBUG: Log detalhado dos participantes
  if(r.nome && r.nome.includes('PRJ22499') && r.nome.includes('Noélio')) {
    console.log('🔍 Participantes a verificar (após parse):', parts.length, parts);
  }

  for(const p of parts){
    if(p.email && pessoa.email && p.email===pessoa.email) {
      if(r.nome && r.nome.includes('PRJ22499')) console.log('✅ Match por email:', p.email);
      return true;
    }
    if(p.nome && pessoa.nome && (p.nome||'').toLowerCase()===pessoa.nome.toLowerCase()) {
      if(r.nome && r.nome.includes('PRJ22499')) console.log('✅ Match por nome:', p.nome);
      return true;
    }
    // Fallback: se nao bateu exato, confere se o nome extraido eh parte do nome da pessoa
    const nomeExt = (p.nome_extraido||'').toLowerCase();
    const nomePessoa = (pessoa.nome||'').toLowerCase();
    if(nomeExt && nomeExt.length > 3){
      const palavrasExt = nomeExt.split(/\s+/);
      const palavrasPessoa = nomePessoa.split(/\s+/);
      // Se todos as palavras extraidas estao em sequencia no nome da pessoa, match
      let match = true;
      if(palavrasExt.length > 0 && palavrasPessoa.length > 0){
        if(palavrasExt[0] === palavrasPessoa[0]){
          // Primeiro nome bate - confere se continua
          let idx = 0;
          for(const pal of palavrasExt){
            if(idx < palavrasPessoa.length && pal === palavrasPessoa[idx]){
              idx++;
            } else {
              match = false;
              break;
            }
          }
          if(match) {
            if(r.nome && r.nome.includes('PRJ22499')) console.log('✅ Match por nome_extraido:', nomeExt, '~', nomePessoa);
            return true;
          }
        }
      }
    }
  }
  return false;
}
// Verifica se pessoa está em período de licença/férias/afastamento
function pessoaEmLicenca(pessoa, dataRef){
  if(!pessoa || !pessoa.id) return false;

  // Verifica se a pessoa está marcada como inativa
  if(pessoa.ativa === false) return true;

  // Verifica ausências ativas no Supabase
  const ausenciasCache = window.SupabaseGestao?.ausenciasCache || {};
  const ausenciasDoSupabase = ausenciasCache[pessoa.id] || [];
  const dataRefStr = (dataRef||'').slice(0,10); // Garante YYYY-MM-DD

  // DEBUG: Log quando procurando ausências
  if(pessoa.nome && pessoa.nome.toLowerCase().includes('joão')) {
    console.log(`🔍 pessoaEmLicenca debug para ${pessoa.nome}:`, {
      pessoaId: pessoa.id,
      cache: ausenciasCache,
      ausenciaEncontrada: ausenciasDoSupabase,
      dataRef: dataRefStr
    });
  }

  // Verifica se há ausência ativa para esta data
  for(const a of ausenciasDoSupabase){
    const inicio = new Date(a.data_inicio);
    const fim = new Date(a.data_fim);
    const data = new Date(dataRefStr);

    // Ajusta para UTC para evitar problemas de timezone
    inicio.setUTCHours(0, 0, 0, 0);
    fim.setUTCHours(0, 0, 0, 0);
    data.setUTCHours(0, 0, 0, 0);

    if(data >= inicio && data <= fim){
      return true; // Pessoa está em período de licença
    }
  }

  return false;
}

function statusPessoa(pessoa, dataRef){
  // Proteção contra valores undefined
  if(!pessoa || !window.D) return null;

  // Se a pessoa está em licença/férias/afastamento, ignora como pendente
  if(pessoaEmLicenca(pessoa, dataRef)) return null;

  // Retorna RDP onde a pessoa é responsável OU participante
  // Prioriza: 1º RDP onde é responsável, 2º RDP onde é participante
  const dataRefStr = (dataRef||'').slice(0,10); // Garante apenas YYYY-MM-DD
  const enviados = (window.D.rdps||[]).filter(r => {
    const rData = (r.data||'').slice(0,10); // Extrai apenas YYYY-MM-DD
    return rData === dataRefStr && pessoaNoRDP(pessoa, r);
  });
  if(enviados.length === 0) return null;

  // Prioriza: RDP onde pessoa é responsável
  const nomePessoa = pessoa.nome ? (pessoa.nome||'').toLowerCase() : '';
  for(const r of enviados){
    if(nomePessoa && (r.responsavel||'').toLowerCase() === nomePessoa){
      return r;
    }
  }
  // Fallback: primeiro RDP onde é participante
  return enviados[0];
}

/**
 * NOVO: Retorna TODOS os RDPs onde a pessoa é responsável ou participante
 * Usado no renderStatus() para mostrar múltiplos RDPs por pessoa
 */
function statusPessoaTodos(pessoa, dataRef){
  // Proteção contra valores undefined
  if(!pessoa || !window.D) return [];

  // Se a pessoa está em licença/férias/afastamento, ignora como pendente
  if(pessoaEmLicenca(pessoa, dataRef)) return [];

  // Retorna TODOS os RDPs onde a pessoa é responsável OU participante
  const dataRefStr = (dataRef||'').slice(0,10); // Garante apenas YYYY-MM-DD
  const rdpsEncontrados = (window.D.rdps||[]).filter(r => {
    const rData = (r.data||'').slice(0,10); // Extrai apenas YYYY-MM-DD
    return rData === dataRefStr && pessoaNoRDP(pessoa, r);
  });

  // Prioriza: RDPs onde pessoa é responsável primeiro
  const nomePessoa = pessoa.nome ? (pessoa.nome||'').toLowerCase() : '';
  const responsavel = rdpsEncontrados.filter(r =>
    nomePessoa && (r.responsavel||'').toLowerCase() === nomePessoa
  );
  const participante = rdpsEncontrados.filter(r =>
    !nomePessoa || (r.responsavel||'').toLowerCase() !== nomePessoa
  );

  // Retorna: primeiro os que é responsável, depois os que é participante
  return [...responsavel, ...participante];
}

function isoToUserDate(iso){
  if(!iso || iso.length !== 10) return '';
  const [y, m, d] = iso.split('-');
  return `${d}/${m}/${y}`;
}
function userDateToIso(userDate){
  if(!userDate || userDate.length !== 10) return '';
  const [d, m, y] = userDate.split('/');

}

    if(!s || typeof s !== 'string') return false;
    const m = s.match(/^(\d{4})-(\d{2})-(\d{2})$/);
    if(!m) return false;
    const mm = parseInt(m[2],10), dd = parseInt(m[3],10);

  // Flatten arrays de projeto_codigo
  const projetosAtivos = new Set();
  rdpsRange.forEach(r => {
    if(r.projeto_codigo){
      if(Array.isArray(r.projeto_codigo)){
        r.projeto_codigo.forEach(p => projetosAtivos.add(p));
      } else {
        projetosAtivos.add(r.projeto_codigo);
      }
    }
  });
  const pendAbertas = (window.D.pendencias||[]).filter(p => (p.status||'').toLowerCase()==='aberta').length;

  $('ovKpis').innerHTML = `<div class="kpi-grid">
    <div class="kpi"><div class="kpi-label">Total Esperado</div><div class="kpi-value">${totalEsperado}</div><div class="kpi-sub">${pessoasFil.length} pessoas × ${diasUteis.length} dias úteis</div></div>
    <div class="kpi kpi-success"><div class="kpi-label">Enviados</div><div class="kpi-value">${totalEnvios}</div><div class="kpi-sub">RDPs no período</div></div>
    <div class="kpi kpi-warning"><div class="kpi-label">Pendentes</div><div class="kpi-value">${totalPendentes}</div><div class="kpi-sub">não enviados</div></div>
    <div class="kpi ${conformidade>=metaGeralDiaria?'kpi-success':conformidade>=(metaGeralDiaria*0.7)?'kpi-warning':'kpi-danger'}"><div class="kpi-label">Conformidade</div><div class="kpi-value">${conformidade.toFixed(0)}%</div><div class="kpi-sub">meta: ${metaGeralDiaria}%</div></div>
    <div class="kpi kpi-purple"><div class="kpi-label">Projetos</div><div class="kpi-value">${projetosAtivos.size}</div><div class="kpi-sub">com RDP no período</div></div>
    <div class="kpi kpi-danger"><div class="kpi-label">Pendências Abertas</div><div class="kpi-value">${pendAbertas}</div><div class="kpi-sub">acumulado total</div></div>
  </div>`;

  // Pendentes: quem não enviou NENHUM RDP no período inteiro (e não estava em ausência o tempo todo)
  const pendentes = pessoasFil.filter(p => {
    const diasEnviados = pessoaDiasEnviados.get((p.email||'').toLowerCase()) || new Set();
    // Se enviou algo, não é pendente
    if(diasEnviados.size > 0) return false;
    // Se não enviou, verificar se estava em ausência o tempo todo
    const diasEmAusencia = diasUteis.filter(d => pessoaEmAusencia(p, d)).length;
    // Se esteve em ausência todo o período, não é pendente
    if(diasEmAusencia === diasUteis.length) return false;
    // Caso contrário, é pendente
    return true;
  });
  $('ovPendCount').textContent = pendentes.length;
  $('ovPendTbody').innerHTML = pendentes.length ? pendentes.map(p => {
    const ult = ultimoEnvio(p);
    let ultBadge = '<span class="badge badge-danger">Nunca enviou</span>';
    if(ult){
      const diasAtras = Math.round((new Date(today) - new Date(ult.data))/86400000);
      ultBadge = `${fmtDate(ult.data)} <span class="badge ${diasAtras>=3?'badge-danger':'badge-warning'}">${diasAtras} dia(s)</span>`;
    }
    return `<tr>
      <td><b>${escHtml(p.nome)}</b></td>
      <td><span class="badge badge-default">${escHtml(p.equipe)}</span></td>
      <td><a style="color:var(--c-primary)" href="mailto:${escHtml(p.email)}">${escHtml(p.email)}</a></td>
      <td>${ultBadge}</td>
      <td>${ult && ult.projeto_codigo ? (Array.isArray(ult.projeto_codigo) ? ult.projeto_codigo.map(p => `<span class="badge badge-primary">${escHtml(p)}</span>`).join(' ') : `<span class="badge badge-primary">${escHtml(ult.projeto_codigo)}</span>`) : '—'}</td>
    </tr>`;
  }).join('') : '<tr><td colspan="5" class="empty">Todos enviaram pelo menos 1 RDP no período. </td></tr>';

  // Ranking Individual: todas as pessoas com suas stats
  const ranking = pessoasFil.map(p => {
    let env = 0;
    diasUteis.forEach(d => {
      if(rdpsRange.some(r => (r.data||'').slice(0,10) === d && pessoaNoRDP(p, r))) env++;
    });
    const ult = ultimoEnvio(p);
    return { pessoa: p, env, esperado: diasUteis.length, ultimo: ult ? ult.data : '' };
  }).sort((a,b) => b.env - a.env || a.pessoa.nome.localeCompare(b.pessoa.nome));

  $('ovRankingTbody').innerHTML = ranking.length ? ranking.map((r, i) => {
    const taxa = r.esperado ? r.env/r.esperado*100 : 0;
    const cor = taxa>=80?'var(--c-success)':taxa>=50?'var(--c-warning)':'var(--c-danger)';
    return `<tr>
      <td>${i+1}</td>
      <td><b>${escHtml(r.pessoa.nome)}</b></td>
      <td><span class="badge badge-default">${escHtml(r.pessoa.equipe)}</span></td>
      <td>${r.env}</td><td>${r.esperado}</td>
      <td><div class="taxa-cell"><div class="taxa-bar"><div class="taxa-bar-fill" style="width:${taxa.toFixed(0)}%;background:${cor}"></div></div><b style="color:${cor}">${taxa.toFixed(0)}%</b></div></td>
      <td><small>${r.ultimo ? fmtDate(r.ultimo) : '-'}</small></td>
    </tr>`;
  }).join('') : '<tr><td colspan="7" class="empty">Sem pessoas neste período.</td></tr>';

  // Charts
  setTimeout(()=>{
    // Desempenho por equipe: % envio no periodo (envios reais / esperado)
    const eqGroups = {};
    pessoasFil.forEach(p => {
      const e = p.equipe || '-';
      if(!eqGroups[e]) eqGroups[e] = {esperado:0, enviados:0};
      eqGroups[e].esperado += diasUteis.length;
      eqGroups[e].enviados += (pessoaDiasEnviados.get((p.email||'').toLowerCase()) || new Set()).size;
    });
    const eqLabels = Object.keys(eqGroups);
    const eqData = eqLabels.map(l => eqGroups[l].esperado ? (eqGroups[l].enviados/eqGroups[l].esperado*100):0);
    const ctx1 = $('chEquipe');
    if(ctx1) new Chart(ctx1, { type:'bar', data:{labels:eqLabels,datasets:[{label:'% enviado',data:eqData,backgroundColor:'#3b82f6'}]}, options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true,max:100,ticks:{callback:v=>v+'%'}}}} });
    // Entrega diaria: dias do range, contando envios por dia (de pessoas filtradas)
    const days = diasUteis;
    const dailyVals = days.map(d => {
      let n = 0;
      pessoasFil.forEach(p => {
        if(rdpsRange.some(r => (r.data||'').slice(0,10)===d && pessoaNoRDP(p, r))) n++;
      });
      return n;
    });
    const ctx2 = $('chDaily');
    if(ctx2) new Chart(ctx2, { type:'line', data:{labels:days.map(fmtDate),datasets:[{label:'envios',data:dailyVals,borderColor:'#3b82f6',backgroundColor:'rgba(59,130,246,.15)',tension:.3,fill:true}]}, options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true}}} });
  }, 50);
}

// Status Diario
function renderStatus(){
  const sec = $('section-status');
  if(!window.D){ sec.innerHTML = '<div class="empty">Sem dados.</div>'; return; }
  const today = (window.D.meta && window.D.meta.today) || new Date().toISOString().slice(0,10);
  const datasSet = new Set((window.D.rdps||[]).map(r => (r.data||'').slice(0,10)));
  const datasOrd = Array.from(datasSet).filter(d => d <= today).sort().reverse();
  const dataAtual = sec.dataset.data || (datasOrd[0] || today);
  const equipeF = sec.dataset.equipe || 'Todas';
  const statusF = sec.dataset.status || 'Todos';
  const buscaF = (sec.dataset.busca || '').toLowerCase();
  const equipes = Array.from(new Set((window.D.pessoas||[]).map(p => p.equipe).filter(Boolean))).sort();

  let pessoas = (window.D.pessoas||[]).filter(p => p.ativa !== false); // Excluir pessoas inativas
  if(equipeF!=='Todas') pessoas = pessoas.filter(p => p.equipe===equipeF);
  if(buscaF) pessoas = pessoas.filter(p => {
    const rdpsPessoa = (window.D.rdps||[]).filter(r => (r.data||'').slice(0,10) === dataAtual && pessoaNoRDP(p, r));
    const matchProjeto = rdpsPessoa.some(r => {
      let codigo = r.projeto_codigo ? (Array.isArray(r.projeto_codigo) ? r.projeto_codigo.join(' ') : r.projeto_codigo) : '';
      let nome = r.projeto_nome ? (Array.isArray(r.projeto_nome) ? r.projeto_nome.join(' ') : r.projeto_nome) : '';
      return (codigo + ' ' + nome).toLowerCase().includes(buscaF);
    });
    return (p.nome||'').toLowerCase().includes(buscaF) || (p.email||'').toLowerCase().includes(buscaF) || matchProjeto;
  });
  const enriquecido = pessoas.map(p => {
    const enviou = statusPessoaTodos(p, dataAtual); // AGORA retorna array de RDPs
    const emLicenca = pessoaEmLicenca(p, dataAtual);
    return { pessoa: p, enviou, emLicenca };
  });
  let listFiltrada = enriquecido;
  if(statusF==='Enviou') listFiltrada = enriquecido.filter(x => x.enviou.length > 0);
  if(statusF==='Pendente') listFiltrada = enriquecido.filter(x => x.enviou.length === 0 && !x.emLicenca);
  const enviaramN = enriquecido.filter(x => x.enviou.length > 0).length;
  const emLicencaN = enriquecido.filter(x => x.emLicenca && x.enviou.length === 0).length;
  const pendentesN = enriquecido.filter(x => x.enviou.length === 0 && !x.emLicenca).length;

  sec.innerHTML = `
    <div class="filters">
      <div class="field"><label>Data</label><select class="select" id="stDate">${datasOrd.map(d => `<option ${d===dataAtual?'selected':''}>${d}</option>`).join('')}</select></div>
      <div class="field"><label>Equipe</label><select class="select" id="stEquipe"><option>Todas</option>${equipes.map(e => `<option ${e===equipeF?'selected':''}>${escHtml(e)}</option>`).join('')}</select></div>
      <div class="field"><label>Status</label><select class="select" id="stStatus"><option>Todos</option><option ${statusF==='Enviou'?'selected':''}>Enviou</option><option ${statusF==='Pendente'?'selected':''}>Pendente</option></select></div>
      <div class="field" style="flex:1"><label>Buscar</label><input class="input" id="stBusca" placeholder="Nome, email ou projeto..." value="${escHtml(buscaF)}"></div>
      <div class="field"><label>&nbsp;</label><button class="btn btn-primary" id="stApply">Filtrar</button></div>
    </div>
    <div class="card">
      <div class="card-head">
        <h3>Colaboradores - ${fmtDate(dataAtual)}</h3>
        <div style="display:flex;gap:8px"><span class="badge badge-success">${enviaramN} enviaram</span><span class="badge badge-warning">${pendentesN} pendentes</span><span class="badge badge-info">${emLicencaN} em licença</span></div>
      </div>
      <div class="card-body no-pad"><table class="tbl">
        <thead><tr><th>Status</th><th>Colaborador</th><th>Equipe</th><th>Email</th><th>Disciplina</th><th>Projeto</th><th>Arquivo</th></tr></thead>
        <tbody>${listFiltrada.length ? listFiltrada.map((x, pessoaIdx) => {
          // Se a pessoa enviou RDPs, cria uma linha para cada RDP
          if(x.enviou.length > 0){
            return x.enviou.map((rdp, rdpIdx) => {
              const btnId = `st-rdp-${pessoaIdx}-${rdpIdx}`;
              let arquivoCell = '-';
              if(rdp.arquivo && rdp.data){
                // Handle arquivo como string ou array
                let arquivos = Array.isArray(rdp.arquivo) ? rdp.arquivo : [rdp.arquivo];
                let label = arquivos.length > 1 ? `📄 ${arquivos.length} arquivos` : `📄 ${escHtml(arquivos[0]).slice(0,35)}`;
                arquivoCell = `<button id="${btnId}" title="Abrir RDP${arquivos.length > 1 ? ' (múltiplos)' : ''}" style="background:none;border:none;color:var(--c-primary);cursor:pointer;font-size:11px;padding:0">${label}</button>`;
              }
              return `<tr>
                <td><span class="badge badge-success">Enviou</span></td>
                <td><b>${escHtml(x.pessoa.nome)}</b><br><small style="color:var(--c-text-3)">${escHtml(x.pessoa.email)}</small></td>
                <td><span class="badge badge-default">${escHtml(x.pessoa.equipe)}</span></td>
                <td>${escHtml(x.pessoa.email)}</td>
                <td>${escHtml(x.pessoa.disciplina)}</td>
                <td>${rdp.projeto_codigo ? (Array.isArray(rdp.projeto_codigo) ? rdp.projeto_codigo.map(p => `<span class="badge badge-primary">${escHtml(p)}</span>`).join(' ') : `<span class="badge badge-primary">${escHtml(rdp.projeto_codigo)}</span>`) : '-'}</td>
                <td><small>${arquivoCell}</small></td>
              </tr>`;
            }).join('');
          } else {
            // Pessoa não enviou nada neste dia
            return `<tr>
              <td><span class="badge badge-danger">Pendente</span></td>
              <td><b>${escHtml(x.pessoa.nome)}</b><br><small style="color:var(--c-text-3)">${escHtml(x.pessoa.email)}</small></td>
              <td><span class="badge badge-default">${escHtml(x.pessoa.equipe)}</span></td>
              <td>${escHtml(x.pessoa.email)}</td>
              <td>${escHtml(x.pessoa.disciplina)}</td>
              <td>-</td>
              <td>-</td>
            </tr>`;
          }
        }).join('') : '<tr><td colspan="7" class="empty">Sem registros.</td></tr>'}</tbody>
      </table></div>
    </div>
  `;

  // Attach click handlers para botões de RDP
  // Agora x.enviou é um array de RDPs, não um único RDP
  listFiltrada.forEach((x, pessoaIdx) => {
    x.enviou.forEach((rdp, rdpIdx) => {
      if(rdp.arquivo && rdp.data){
        const btnId = `st-rdp-${pessoaIdx}-${rdpIdx}`;
        const btn = $(btnId);
        if(btn){
          btn.onclick = () => abrirRDP(rdp.data, rdp.arquivo);
        }
      }
    });
  });

  $('stApply').onclick = () => {
    sec.dataset.data = $('stDate').value;
    sec.dataset.equipe = $('stEquipe').value;
    sec.dataset.status = $('stStatus').value;
    sec.dataset.busca = $('stBusca').value;
    renderStatus();
  };
}

// Por Equipe
function renderEquipe(){
  const sec = $('section-equipe');
  if(!window.D){ sec.innerHTML = '<div class="empty">Sem dados.</div>'; return; }
  const today = (window.D.meta && window.D.meta.today) || new Date().toISOString().slice(0,10);
  const dataContabilizacao = localStorage.getItem('rdp_data_inicio') || '2026-01-01';
  const datasSet = new Set((window.D.rdps||[]).map(r => (r.data||'').slice(0,10)));
  const datasOrd = Array.from(datasSet).filter(d => d <= today).sort();
  const dataInicioMeta = getDataInicioContabilizacao();
  const de = sec.dataset.de || dataInicioMeta || datasOrd[0] || '';
  const ate = sec.dataset.ate || datasOrd[datasOrd.length-1] || '';
  const equipeFiltroStr = (sec.dataset.equipeFiltro || '').trim() || 'Todas';
  const equipeFiltro = equipeFiltroStr === 'Todas' ? ['Todas'] : equipeFiltroStr.split('|').filter(Boolean);
  const equipes = {};
  (window.D.pessoas||[]).filter(p => p.ativa !== false).forEach(p => {
    if(!p.equipe) return;
    if(!equipes[p.equipe]) equipes[p.equipe] = { membros:[], leader:'' };
    equipes[p.equipe].membros.push(p);
    // Prefere campo "lider" explicito (gravado pelo extrator); fallback: ultimo trecho do nome da equipe; fallback: a propria equipe
    if(p.lider) {
      equipes[p.equipe].leader = p.lider;
    } else {
      const m = p.equipe.split(" - ");
      equipes[p.equipe].leader = m.length > 1 ? m[m.length-1] : p.equipe;
    }
  });
  const datasPeriodo = datasOrd.filter(d => d>=de && d<=ate && d>=dataInicioMeta);
  const compl = Object.entries(equipes).filter(([nome]) => equipeFiltro.includes('Todas') || equipeFiltro.includes(nome)).map(([nome, eq]) => {
    const esperado = eq.membros.length * datasPeriodo.length;
    let enviados = 0;
    eq.membros.forEach(p => { datasPeriodo.forEach(d => { if(statusPessoa(p, d)) enviados++; }); });
    return { nome, leader:eq.leader, membros:eq.membros.length, enviados, esperado, taxa: esperado?enviados/esperado*100:0 };
  });
  const ranking = (window.D.pessoas||[]).filter(p => p.ativa !== false && (equipeFiltro.includes('Todas') || equipeFiltro.includes(p.equipe))).map(p => {
    let env = 0; datasPeriodo.forEach(d => { if(statusPessoa(p,d)) env++; });
    const ult = ultimoEnvio(p);
    return { pessoa:p, env, esperado: datasPeriodo.length, ultimo: ult ? ult.data : '' };
  }).sort((a,b) => b.env - a.env || a.pessoa.nome.localeCompare(b.pessoa.nome));

  sec.innerHTML = `
    <div class="filters">
      <div class="field"><label>Calendário (De)</label><input class="input" type="date" id="eqDe" value="${de}"></div>
      <div class="field"><label>Até</label><input class="input" type="date" id="eqAte" value="${ate}"></div>
      <div class="field" style="min-width:280px;flex:1">
        <label>Equipe</label>
        <div class="eq-dropdown">
          <button type="button" class="eq-dropdown-btn" id="eqEquipeBtn">
            <span id="eqEquipeBtnLabel">Todas as equipes</span>
            <span class="eq-dropdown-btn-icon">▼</span>
          </button>
          <div class="eq-dropdown-menu" id="eqEquipeMenu">
            <div class="eq-dropdown-item">
              <input type="checkbox" id="eqTodas" ${equipeFiltro.includes('Todas')?'checked':''}>
              <label for="eqTodas">Todas as equipes</label>
            </div>
            ${Object.keys(equipes).sort().map((e, i) => `<div class="eq-dropdown-item">
              <input type="checkbox" id="eq_${i}" class="eqEquipeCheckbox" value="${escHtml(e)}" ${equipeFiltro.includes(e)?'checked':''}>
              <label for="eq_${i}">${escHtml(e.split(' - ')[0])}</label>
            </div>`).join('')}
          </div>
        </div>
      </div>
      <div class="field"><label>&nbsp;</label><button class="btn btn-primary" id="eqApply">Aplicar</button></div>
    </div>
    <div class="kpi-grid">
      ${compl.map(c => {
        const cor = c.taxa>=80?'var(--c-success)':c.taxa>=50?'var(--c-warning)':'var(--c-danger)';
        return `<div class="equipe-card" style="border-top-color:${cor}">
          <div style="font-weight:700;font-size:14px">${escHtml(c.nome.split(' - ')[0])}</div>
          <div class="leader">Lider: ${escHtml(c.leader || '-')}</div>
          <div class="equipe-row"><span>Membros</span><span class="v">${c.membros}</span></div>
          <div class="equipe-row"><span>Compliance</span><span class="v" style="color:${cor}">${c.taxa.toFixed(0)}%</span></div>
          <div style="font-size:11px;color:var(--c-text-3)">${c.enviados} envios de ${c.esperado} esperados</div>
          <div class="compliance-bar"><div class="compliance-bar-fill" style="width:${c.taxa.toFixed(0)}%;background:${cor}"></div></div>
        </div>`;
      }).join('')}
    </div>
    <div class="card">
      <div class="card-head"><h3>Ranking Individual</h3><div class="card-sub">ordenado por envios no periodo</div></div>
      <div class="card-body no-pad"><table class="tbl">
        <thead><tr><th>#</th><th>Colaborador</th><th>Equipe</th><th>Enviados</th><th>Esperados</th><th>Taxa</th><th>Ultimo</th></tr></thead>
        <tbody>${ranking.map((r,i) => {
          const taxa = r.esperado ? r.env/r.esperado*100 : 0;
          const cor = taxa>=80?'var(--c-success)':taxa>=50?'var(--c-warning)':'var(--c-danger)';
          return `<tr>
            <td>${i+1}</td>
            <td><b>${escHtml(r.pessoa.nome)}</b></td>
            <td><span class="badge badge-default">${escHtml(r.pessoa.equipe)}</span></td>
            <td>${r.env}</td><td>${r.esperado}</td>
            <td><div class="taxa-cell"><div class="taxa-bar"><div class="taxa-bar-fill" style="width:${taxa.toFixed(0)}%;background:${cor}"></div></div><b style="color:${cor}">${taxa.toFixed(0)}%</b></div></td>
            <td><small>${r.ultimo ? fmtDate(r.ultimo) : '-'}</small></td>
          </tr>`;
        }).join('')}</tbody>
      </table></div>
    </div>
    <small style="display:block;margin-top:8px;color:var(--c-text-3)">Período respeita a data de início em Metas: ${fmtDate(dataInicioMeta)}</small>
  `;
  $('eqApply').onclick = () => {
    const eqDe = $('eqDe');
    const eqAte = $('eqAte');
    if(!eqDe || !eqAte) return;
    const dVal = eqDe.value;
    const aVal = eqAte.value;
    if(dVal) sec.dataset.de = dVal;
    if(aVal) sec.dataset.ate = aVal;
    const todas = $('eqTodas');
    const checks = Array.from(document.querySelectorAll('.eqEquipeCheckbox'));
    const selecionadas = checks.filter(c => c.checked).map(c => c.value);
    sec.dataset.equipeFiltro = (todas && todas.checked) || selecionadas.length === 0 ? 'Todas' : selecionadas.join('|');
    renderEquipe();
  };

  const eqBtn = $('eqEquipeBtn');
  const eqMenu = $('eqEquipeMenu');
  const eqTodas = $('eqTodas');
  const eqChecks = Array.from(document.querySelectorAll('.eqEquipeCheckbox'));
  const eqBtnLabel = $('eqEquipeBtnLabel');
  const atualizarLabelEquipes = () => {
    const marcadas = eqChecks.filter(c => c.checked).map(c => c.value);
    let label = 'Todas as equipes';
    if(!(eqTodas && eqTodas.checked)){
      label = marcadas.length === 0 ? 'Nenhuma equipe' : (marcadas.length === 1 ? '1 equipe' : `${marcadas.length} equipes`);
    }
    eqBtnLabel.textContent = label;
  };
  if(eqBtn && eqMenu){
    eqBtn.onclick = () => { eqBtn.classList.toggle('open'); eqMenu.classList.toggle('show'); };
    document.addEventListener('click', (e) => {
      if(!eqBtn.contains(e.target) && !eqMenu.contains(e.target)){
        eqBtn.classList.remove('open');
        eqMenu.classList.remove('show');
      }
    });
  }
  if(eqTodas){
    eqTodas.onchange = () => {
      if(eqTodas.checked) eqChecks.forEach(c => c.checked = false);
      atualizarLabelEquipes();
    };
  }
  eqChecks.forEach(c => c.onchange = () => {
    if(c.checked && eqTodas) eqTodas.checked = false;
    if(!eqChecks.some(x => x.checked) && eqTodas) eqTodas.checked = true;
    atualizarLabelEquipes();
  });
  atualizarLabelEquipes();

}

// ── Acoes em pendencias (persistencia local em localStorage) ────────────
// ── Persistencia de acoes ─────────────────────────────────────────────
// Estrategia: cache em memoria + localStorage (sem servidor remoto)
const ACOES_KEY = 'rdp-acoes-v1';
let _acoesCache = {};
let _acoesSrv = false; // localStorage mode
let _acoesSaveTimer = null;

async function acoesBootstrap(){
  // Carrega diretamente do localStorage
  try {
    _acoesCache = JSON.parse(localStorage.getItem(ACOES_KEY) || '{}');
    console.log('✅ Ações carregadas do localStorage:', Object.keys(_acoesCache).length);
  } catch(e){
    _acoesCache = {};
    console.warn('⚠️ Erro ao carregar ações:', e.message);
  }
  atualizarStatusServidor();
}

function acoesLoad(){
  return _acoesCache || {};
}
function acoesSave(obj){
  _acoesCache = obj || {};
  // Salva no localStorage
  try { localStorage.setItem(ACOES_KEY, JSON.stringify(_acoesCache)); } catch(e){}
  console.log('💾 Ações salvas em localStorage');
}
async function atualizarStatusServidor(){
  const el = document.getElementById('srvStatus');
  if(!el) return;

  try {
    // Testa conexão com Supabase
    const url = `${window.SUPABASE_URL}/rest/v1/rdps?limit=1&select=id`;
    const response = await fetch(url, {
      headers: { 'apikey': window.SUPABASE_KEY }
    });

    if(response.ok){
      el.textContent = '● Supabase';
      el.style.color = 'var(--c-success)';
      el.title = 'Conectado ao Supabase';
      _acoesSrv = true;
    } else {
      el.textContent = '○ Desconectado';
      el.style.color = 'var(--c-warning)';
      el.title = 'Sem conexão com Supabase';
      _acoesSrv = false;
    }
  } catch(err) {
    el.textContent = '○ Desconectado';
    el.style.color = 'var(--c-warning)';
    el.title = 'Erro na conexão com Supabase: ' + err.message;
    _acoesSrv = false;
    console.error('Erro ao verificar status do Supabase:', err);
  }
}
function pendKey(projCodigo, sistema, descricao){
  // Chave estavel da pendencia: projeto + sistema + primeiros 80 chars normalizados
  const norm = String(descricao||'').toLowerCase().replace(/\s+/g,' ').trim().slice(0,80);
  return projCodigo + '||' + sistema + '||' + norm;
}
function uuid(){
  return 'a' + Math.random().toString(36).slice(2,11) + Date.now().toString(36).slice(-4);
}
function acaoAdd(pkey, txt, resp, prazo){
  const all = acoesLoad();
  if(!all[pkey]) all[pkey] = [];
  all[pkey].push({
    id: uuid(),
    acao: txt,
    responsavel: resp || '',
    prazo: prazo || '',
    status: 'Aberta',
    criadoEm: new Date().toISOString(),
    atualizadoEm: new Date().toISOString()
  });
  acoesSave(all);
}
function acaoUpdate(pkey, id, patch){
  const all = acoesLoad();
  const list = all[pkey] || [];
  const idx = list.findIndex(x => x.id === id);
  if(idx < 0) return;
  Object.assign(list[idx], patch, { atualizadoEm: new Date().toISOString() });
  acoesSave(all);
}
function acaoRemove(pkey, id){
  const all = acoesLoad();
  if(!all[pkey]) return;
  all[pkey] = all[pkey].filter(x => x.id !== id);
  if(!all[pkey].length) delete all[pkey];
  acoesSave(all);
}
function exportarAcoes(){
  const all = acoesLoad();
  const blob = new Blob([JSON.stringify(all, null, 2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'rdp_acoes_' + new Date().toISOString().slice(0,10) + '.json';
  document.body.appendChild(a); a.click(); a.remove();
}
function importarAcoes(){
  const inp = document.createElement('input');
  inp.type = 'file'; inp.accept = '.json';
  inp.onchange = e => {
    const f = e.target.files[0]; if(!f) return;
    const r = new FileReader();
    r.onload = () => {
      try {
        const data = JSON.parse(r.result);
        const cur = acoesLoad();
        // Merge: para cada chave, soma listas (sem dedup por id porque vem de outro device)
        for(const k in data){
          if(!cur[k]) cur[k] = [];
          cur[k].push(...data[k]);
        }
        acoesSave(cur);
        alert('Importado com sucesso. Recarregue a aba.');
        renderProjetos();
      } catch(err) { alert('Falha: ' + err.message); }
    };
    r.readAsText(f);
  };
  inp.click();
}
async function reloadAcoesFromServer(){
  // Recarrega do localStorage
  try {
    _acoesCache = JSON.parse(localStorage.getItem(ACOES_KEY) || '{}');
    atualizarStatusServidor();
    renderProjetos();
    console.log('✅ Ações recarregadas do localStorage');
  } catch(e){
    alert('Falha ao recarregar ações: ' + e.message);
  }
}

const STATUS_NEXT = { 'Aberta':'Em andamento', 'Em andamento':'Concluida', 'Concluida':'Aberta' };
const STATUS_CLS = { 'Aberta':'aberta', 'Em andamento':'andamento', 'Concluida':'concluida' };
const STATUS_BADGE_CLS = { 'Aberta':'badge-warning', 'Em andamento':'badge-primary', 'Concluida':'badge-success' };

function renderPendenciaItem(projCodigo, sistema, it){
  const descNormalizada = (it.desc || it.descricao || it.pendencia || it.titulo || it.observacao || '').toString().trim();
  const pkey = pendKey(projCodigo, sistema, descNormalizada);
  const acoes = (acoesLoad()[pkey] || []);
  const hasAcao = acoes.length > 0;
  const todasConcluidas = hasAcao && acoes.every(a => a.status === 'Concluida');
  const cls = todasConcluidas ? 'concluida' : (hasAcao ? 'has-acao' : '');
  const safeDesc = escHtml(descNormalizada || 'Pendência sem descrição');
  return `<div class="proj-pend-item ${cls}" data-pkey="${pkey}" onclick="event.stopPropagation()">
    <div class="proj-pend-info">
      <div class="proj-pend-desc">${safeDesc}</div>
      <small style="color:var(--c-text-3);white-space:nowrap">${fmtDate(it.data)} · ${it.responsavel_id ? escHtml(it.responsavel) + ' (' + escHtml(it.responsavel_id) + ')' : escHtml(it.responsavel||'-')}</small>
    </div>
    <div style="display:flex;gap:8px;align-items:center;margin-top:4px">
      <span class="proj-pend-toggle" onclick="this.closest('.proj-pend-item').classList.toggle('expanded')">${hasAcao ? '▸ '+acoes.length+' ação(ões)' : '+ adicionar ação'}</span>
    </div>
    <div class="acoes-box">
      ${acoes.map(a => `
        <div class="acao-item ${STATUS_CLS[a.status]||'aberta'}">
          <span style="flex:1">${escHtml(a.acao)} ${a.responsavel?'· <b>'+escHtml(a.responsavel)+(a.responsavel_id?' ('+escHtml(a.responsavel_id)+')':'')+'</b>':''} ${a.prazo?'· prazo '+fmtDate(a.prazo):''}</span>
          <button class="acao-status-btn ${STATUS_BADGE_CLS[a.status]||'badge-warning'}" onclick="acaoToggleStatus('${pkey}','${a.id}')">${a.status}</button>
          <button class="acao-status-btn badge-default" onclick="acaoDel('${pkey}','${a.id}')" title="Remover">×</button>
        </div>
      `).join('')}
      <div class="acao-add">
        <input type="text" placeholder="Nova ação..." id="ac-${pkey.slice(-12)}-txt">
        <input type="text" placeholder="Responsável" id="ac-${pkey.slice(-12)}-resp" style="flex:0 0 120px">
        <input type="date" id="ac-${pkey.slice(-12)}-prazo">
        <button onclick="acaoAddFromUI('${pkey}','${pkey.slice(-12)}')">Adicionar</button>
      </div>
    </div>
  </div>`;
}

function acaoAddFromUI(pkey, suffix){
  const txt = document.getElementById('ac-'+suffix+'-txt').value.trim();
  if(!txt){ alert('Descreva a acao.'); return; }
  const resp = document.getElementById('ac-'+suffix+'-resp').value.trim();
  const prazo = document.getElementById('ac-'+suffix+'-prazo').value;
  acaoAdd(pkey, txt, resp, prazo);
  renderProjetos();
}
function acaoToggleStatus(pkey, id){
  const all = acoesLoad();
  const a = (all[pkey]||[]).find(x => x.id === id);
  if(!a) return;
  acaoUpdate(pkey, id, { status: STATUS_NEXT[a.status] || 'Aberta' });
  renderProjetos();
}
function acaoDel(pkey, id){
  if(!confirm('Remover esta acao?')) return;
  acaoRemove(pkey, id);
  renderProjetos();
}

// Projetos
function renderProjetos(){
  const sec = $('section-projetos');
  if(!window.D){ sec.innerHTML = '<div class="empty">Sem dados.</div>'; return; }
  const projs = window.D.projetos || [];
  const buscaF = (sec.dataset.busca || '').toLowerCase();

  function isResponsavelAtivo(nomeResponsavel) {
    const pessoa = (window.D?.pessoas || []).find(p => p.nome === nomeResponsavel);
    if (!pessoa) return true; // Se não encontrar, assume que está ativo
    return pessoa.ativa !== false; // Retorna true se ativa ou não definido

  // Conta total de acoes em pendencias dos projetos filtrados

  let totalAcoes = 0, totalAbertas = 0;

    <div class="filters">

  $('pjList').innerHTML = filtrados.length ? filtrados.map((p, pidx) => {
    const sistemas = Object.keys(p.pendencias_por_sistema || {}).sort();
    return `<div class="proj-card" onclick="this.classList.toggle('expanded')">
      <div class="proj-head">
        <div>
          <div class="proj-code">${escHtml(p.codigo)} <small style="color:var(--c-text-3);font-weight:500;font-size:12px">- ${escHtml(p.nome || '-')}</small></div>
          <div class="proj-name">${escHtml(p.cliente)}${p.uf?' - '+escHtml(p.uf):''}</div>
          <div class="proj-tags">
            ${p.categoria ? `<span class="badge badge-purple">${escHtml(p.categoria)}</span>` : ''}
            ${p.business_unit ? `<span class="badge badge-primary">${escHtml(p.business_unit)}</span>` : ''}
            ${p.segmento ? `<span class="badge badge-default">${escHtml(p.segmento)}</span>` : ''}

        <div class="proj-meta"><b>${(p.rdps||[]).length}</b> RDPs<br><small>Ultimo: ${fmtDate(p.ultimo_rdp)}</small></div>
      </div>
      <div class="proj-pend">
        <h4 style="margin:0 0 8px;font-size:11px;text-transform:uppercase;color:var(--c-text-3)">RDPs no projeto</h4>

          <tbody>${(p.rdps||[]).filter(r => isResponsavelAtivo(r.responsavel)).map((r, ridx) => {
            const hasFile = r.arquivo && r.data;

          return `<div class="proj-pend-grupo">
            <h4>Pendencias - ${escHtml(s)} (${ps.length})</h4>
            ${ps.map(it => renderPendenciaItem(p.codigo, s, it)).join('')}
          </div>`;
        }).join('')}
      </div>
    </div>`;
  }).join('') : '<div class="empty">Nenhum projeto com RDPs encontrado.</div>';

  // Attach click handlers para botões de RDP na seção de projetos
  filtrados.forEach((p, pidx) => {
    if(p.rdps && p.rdps.length > 0){
      p.rdps.forEach((r, ridx) => {
        if(r.arquivo && r.data){
          const btnId = `pj-rdp-${pidx}-${ridx}`;
          const btn = $(btnId);
          if(btn){
            btn.onclick = (e) => {
              e.stopPropagation(); // Evita toggle do card
              abrirRDP(r.data, r.arquivo);
            };
          }
        }
      });
    }
  });
}

function renderAnalise(){

    return;
  }
  const html = md
    .replace(/^### (.+)$/gm, '<h3 style="margin:18px 0 6px;font-size:14px;color:var(--c-text)">$1</h3>')
    .replace(/^## (.+)$/gm, '<h2 style="margin:24px 0 8px;font-size:18px;color:var(--c-primary)">$1</h2>')
    .replace(/^# (.+)$/gm, '<h1 style="margin:0 0 12px;font-size:24px">$1</h1>')
    .replace(/\*\*(.+?)\*\*/g, '<b>$1</b>')
    .replace(/`([^`]+)`/g, '<code style="background:var(--c-surface-2);padding:2px 6px;border-radius:4px;font-size:12px">$1</code>')
    .replace(/^\| (.+) \|$/gm, m => '<tr>'+m.slice(2,-2).split(' | ').map(c => '<td style="padding:6px 10px;border:1px solid var(--c-border);font-size:12px">'+c+'</td>').join('')+'</tr>')
    .replace(/(<tr>.*?<\/tr>\s*)+/gs, m => '<table style="border-collapse:collapse;margin:10px 0;width:100%">'+m+'</table>')
    .replace(/^\- (.+)$/gm, '<li>$1</li>')
    .replace(/(<li>.*?<\/li>\s*)+/gs, m => '<ul style="margin:6px 0;padding-left:24px">'+m+'</ul>')
    .replace(/\n\n/g, '</p><p style="margin:8px 0">')
    .replace(/^([^<\n].*)$/gm, '<p style="margin:8px 0">$1</p>');
  sec.innerHTML = '<div class="card"><div class="card-body" style="padding:24px;line-height:1.7;font-size:14px">'+html+'</div></div>';
}

function getPessoaStatus(pessoa, dataISO) {
  // Retorna {status: "ativa"|"ausente"|"inativa", tipos: [...]}
  if (!pessoa || !pessoa.id) return { status: "ativa", tipos: [] };

  // Se marcada como inativa, retorna inativa
  if (pessoa.ativa === false) return { status: "inativa", tipos: [] };

  // Verificar se tem ausência ativa para a data
  const ausenciasCache = window.SupabaseGestao?.ausenciasCache || {};
  const ausenciasDoSupabase = ausenciasCache[pessoa.id] || [];
  const ausenciasAtivas = ausenciasDoSupabase.filter(a => {
    const inicio = new Date(a.data_inicio);
    const fim = new Date(a.data_fim);
    const data = new Date(dataISO);
    return data >= inicio && data <= fim;
  });

  if (ausenciasAtivas.length > 0) {
    const tipos = ausenciasAtivas.map(a => a.tipo);
    return { status: "ausente", tipos };
  }

  return { status: "ativa", tipos: [] };
}

function getPessoaEquipeAtual(pessoa) {
  // Retorna equipe atual (dados do Supabase)
  if (!pessoa || !pessoa.id) return "-";
  return pessoa.equipe || "-"; // Supabase já atualiza o campo equipe
}

function renderGestao() {
  const sec = document.getElementById('section-gestao');
  if (!sec) return;

  const statusFilter = document.getElementById('gestao-filter-status')?.value || 'todos';
  const equipeFilter = document.getElementById('gestao-filter-equipe')?.value || 'todas';
  const searchFilter = document.getElementById('gestao-filter-search')?.value?.toLowerCase() || '';

  // Coletar equipes e estatísticas
  const equipes = new Set();
  const stats = { total: 0, ativos: 0, ausentes: 0, inativos: 0 };

  (window.D?.pessoas || []).forEach(p => {
    const eq = getPessoaEquipeAtual(p);
    if (eq !== '-') equipes.add(eq);
    stats.total++;
    const st = getPessoaStatus(p, new Date().toISOString().split('T')[0]);
    if (st.status === 'ativa') stats.ativos++;
    else if (st.status === 'inativa') stats.inativos++;
    else stats.ausentes++;
  });

  // Filtrar pessoas e ordenar alfabeticamente
  const hoje = new Date().toISOString().split('T')[0];
  let pessoas = (window.D?.pessoas || []).filter(p => {
    if (searchFilter && !p.nome?.toLowerCase().includes(searchFilter)) return false;
    const st = getPessoaStatus(p, hoje);

    if (statusFilter === 'todos') {
      // Mostrar todos EXCETO inativos
      if (st.status === 'inativa') return false;
    } else {
      // Aplicar filtro específico
      if (statusFilter === 'ativos' && st.status !== 'ativa') return false;
      if (statusFilter === 'ferias' && !st.tipos.includes('férias')) return false;
      if (statusFilter === 'afastamento' && !st.tipos.includes('afastamento_médico')) return false;
      if (statusFilter === 'licenca' && !st.tipos.includes('licença')) return false;
      if (statusFilter === 'inativos' && st.status !== 'inativa') return false;
    }

    const eq = getPessoaEquipeAtual(p);
    if (equipeFilter !== 'todas' && eq !== equipeFilter) return false;

    return true;
  }).sort((a, b) => (a.nome || '').localeCompare(b.nome || ''));

  // HTML com padrão consistente
  sec.innerHTML = `
    <p class="page-sub">${stats.total} pessoas · ${stats.ativos} ativos · ${stats.ausentes} em afastamento · ${stats.inativos} inativos</p>

    <div class="filters">
      <div class="field">
        <label>Status</label>
        <select id="gestao-filter-status" class="select">
          <option value="todos">Todos</option>
          <option value="ativos">Ativos</option>
          <option value="ferias">Em Férias</option>
          <option value="afastamento">Afastamento Médico</option>
          <option value="licenca">Licença</option>
          <option value="inativos">Inativos</option>
        </select>
      </div>
      <div class="field">
        <label>Equipe</label>
        <select id="gestao-filter-equipe" class="select">
          <option value="todas">Todas</option>
          ${Array.from(equipes).sort().map(e => `<option value="${escHtml(e)}">${escHtml(e)}</option>`).join('')}
        </select>
      </div>
      <div class="field" style="flex:1;min-width:200px">
        <label>Buscar</label>
        <input id="gestao-filter-search" type="text" class="input" placeholder="Nome da pessoa...">
      </div>
      <div class="field">
        <label>&nbsp;</label>
        <button id="gestao-btn-novo" class="btn btn-primary">+ Cadastrar Nova Pessoa</button>
      </div>
    </div>

    <div class="card">
      <div class="card-head">
        <h3>Pessoas da Equipe</h3>
        <div class="card-sub">${pessoas.length} resultado${pessoas.length !== 1 ? 's' : ''}</div>
      </div>
      <div class="card-body no-pad">
        ${pessoas.length === 0 ?
          '<div class="empty">Nenhuma pessoa encontrada com os filtros aplicados.</div>' :
          `<table class="tbl">
            <thead>
              <tr>
                <th>#</th>
                <th>Nome</th>
                <th>Equipe</th>
                <th>Status</th>
                <th style="text-align:center">Ações</th>
              </tr>
            </thead>
            <tbody>
              ${pessoas.map((p, i) => {
                const st = getPessoaStatus(p, hoje);
                let statusLabel = st.status === 'ativa' ? 'Ativo' :
                                 st.status === 'inativa' ? 'Inativo' :
                                 st.tipos.length > 0 ? st.tipos.map(t =>
                                   t === 'férias' ? 'Férias' :
                                   t === 'afastamento_médico' ? 'Afastamento Médico' : 'Licença'
                                 ).join(', ') : 'Ativo';
                const statusClass = st.status === 'ativa' ? 'badge-success' :
                                   st.status === 'inativa' ? 'badge-danger' : 'badge-warning';
                const eq = getPessoaEquipeAtual(p);
                return `
                  <tr>
                    <td>${i + 1}</td>
                    <td><b>${escHtml(p.nome)}</b></td>
                    <td><span class="badge badge-default">${escHtml(eq)}</span></td>
                    <td><span class="badge ${statusClass}">${escHtml(statusLabel)}</span></td>
                    <td style="text-align:center">
                      <button onclick="abrirModalMudarEquipe('${p.id}')" class="btn btn-icon" title="Mudar Equipe">⚙️</button>
                      <button onclick="abrirModalAusencia('${p.id}')" class="btn btn-icon" title="Registrar Ausência">📅</button>
                      <button onclick="removerPessoa('${p.id}')" class="btn btn-icon" title="Remover Pessoa">🗑️</button>
                    </td>
                  </tr>
                `;
              }).join('')}
            </tbody>
          </table>`
        }
      </div>
    </div>
  `;

  // Atribuir event listeners após render
  document.getElementById('gestao-filter-status')?.addEventListener('change', renderGestao);
  document.getElementById('gestao-filter-equipe')?.addEventListener('change', renderGestao);
  document.getElementById('gestao-filter-search')?.addEventListener('input', renderGestao);
  document.getElementById('gestao-btn-novo')?.addEventListener('click', abrirModalCadastrar);
}

window.addEventListener('dashboardDataRefreshed', (event) => {
  const { rdps, projetos, pendencias } = event.detail;
  console.log(`Dashboard atualizado: ${rdps.length} RDPs, ${projetos.length} Projetos, ${pendencias.length} Pendências`);

  // Re-renderizar a seção ativa se houver função de render
  const activeTab = document.querySelector('.nav-item.active');
  if (activeTab && activeTab.dataset.tab) {
    const tabName = activeTab.dataset.tab;
    const renderFuncName = `render${tabName.charAt(0).toUpperCase() + tabName.slice(1)}`;
    if (typeof window[renderFuncName] === 'function') {
      console.log(`🔄 Re-renderizando seção: ${tabName}`);
      window[renderFuncName]();
    }
  }
});

</script>
</body>
</html>
