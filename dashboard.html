<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Controle RDP · Convergint</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<script>(function(){try{var t=localStorage.getItem('rdp-theme');if(t)document.documentElement.setAttribute('data-theme',t);}catch(e){}})();</script>
<style>
:root{
  /* TECH DARK — default */
  --c-bg:#06080F;
  --c-bg-grid:rgba(34, 211, 238, .035);
  --c-surface:#0E121C;
  --c-surface-2:#141927;
  --c-surface-3:#1A2031;
  --c-border:#1B2233;
  --c-border-2:#2B3550;
  --c-text:#E6EAF2;
  --c-text-2:#9AA4B8;
  --c-text-3:#5B6580;
  --c-primary:#22D3EE;
  --c-primary-soft:rgba(34, 211, 238, .12);
  --c-primary-glow:rgba(34, 211, 238, .35);
  --c-success:#10E89E;
  --c-success-soft:rgba(16, 232, 158, .12);
  --c-warning:#F5B544;
  --c-warning-soft:rgba(245, 181, 68, .14);
  --c-danger:#FF5C7A;
  --c-danger-soft:rgba(255, 92, 122, .14);
  --c-violet:#A78BFA;
  --c-violet-soft:rgba(167, 139, 250, .14);
  --c-pink:#F472B6;
  --r-sm:4px; --r-md:8px; --r-lg:12px; --r-xl:16px; --r-full:999px;
  --sh-soft:0 1px 0 rgba(255,255,255,.02) inset, 0 1px 0 rgba(0,0,0,.4);
  --mono:'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace;
}
[data-theme="light"]{
  --c-bg:#F4F6FA;
  --c-bg-grid:rgba(8, 145, 178, .04);
  --c-surface:#FFFFFF;
  --c-surface-2:#F1F3F8;
  --c-surface-3:#E7EBF3;
  --c-border:#E2E6EE;
  --c-border-2:#CBD2DE;
  --c-text:#0B1220;
  --c-text-2:#4A5468;
  --c-text-3:#8893A8;
  --c-primary:#0891B2;
  --c-primary-soft:rgba(8, 145, 178, .12);
  --c-primary-glow:rgba(8, 145, 178, .18);
  --c-success:#0E9F71;
  --c-success-soft:rgba(14, 159, 113, .10);
  --c-warning:#D08600;
  --c-warning-soft:rgba(208, 134, 0, .12);
  --c-danger:#E03A5E;
  --c-danger-soft:rgba(224, 58, 94, .10);
  --c-violet:#7C5AE7;
  --c-violet-soft:rgba(124, 90, 231, .10);
}

*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  font-family:'Inter', system-ui, sans-serif;
  background:var(--c-bg);
  color:var(--c-text);
  font-size:13.5px;
  line-height:1.5;
  font-feature-settings:"cv11","ss01","ss03";
  letter-spacing:-.005em;
  background-image:
    linear-gradient(var(--c-bg-grid) 1px, transparent 1px),
    linear-gradient(90deg, var(--c-bg-grid) 1px, transparent 1px);
  background-size: 48px 48px;
  background-attachment: fixed;
  min-height:100vh;
}
body::before{
  content:"";
  position:fixed; inset:0;
  pointer-events:none;
  background:
    radial-gradient(900px 600px at 12% -10%, rgba(34,211,238,.06), transparent 60%),
    radial-gradient(800px 500px at 95% 110%, rgba(167,139,250,.05), transparent 60%);
  z-index:0;
}
[data-theme="light"] body::before{
  background:
    radial-gradient(900px 600px at 12% -10%, rgba(8,145,178,.06), transparent 60%),
    radial-gradient(800px 500px at 95% 110%, rgba(124,90,231,.04), transparent 60%);
}

.mono{font-family:var(--mono);font-variant-numeric:tabular-nums}

.app{
  display:grid;
  grid-template-columns:248px 1fr;
  min-height:100vh;
  position:relative;
  z-index:1;
}

/* SIDEBAR */
.sidebar{
  background:linear-gradient(180deg, var(--c-surface) 0%, var(--c-bg) 100%);
  border-right:1px solid var(--c-border);
  position:sticky; top:0;
  height:100vh;
  overflow-y:auto;
  padding:20px 14px;
  display:flex; flex-direction:column;
}
.brand{
  display:flex; align-items:center; gap:10px;
  padding:6px 10px 16px;
  border-bottom:1px solid var(--c-border);
  margin-bottom:14px;
}
.brand-mark{
  width:38px; height:38px;
  border-radius:9px;
  background:linear-gradient(135deg, #0A4E63 0%, #0E6E8A 60%, #18A5CC 100%);
  position:relative;
  display:flex; align-items:center; justify-content:center;
  box-shadow:0 0 0 1px var(--c-border-2), 0 0 22px var(--c-primary-glow), 0 2px 8px rgba(0,0,0,.35);
  flex-shrink:0;
}
.brand-mark svg{display:block}
.brand-mark::after{
  content:"";
  position:absolute; inset:0;
  border-radius:inherit;
  background:linear-gradient(180deg, rgba(255,255,255,.18) 0%, rgba(255,255,255,0) 45%);
  pointer-events:none;
}
.brand-title{
  font-weight:700; font-size:14px;
  letter-spacing:-.01em;
  color:var(--c-text);
}
.brand-sub{
  font-family:var(--mono);
  font-size:10px;
  color:var(--c-text-3);
  margin-top:2px;
  letter-spacing:.04em;
}
.live-pill{
  display:flex; align-items:center; gap:8px;
  padding:8px 10px;
  margin-bottom:18px;
  background:var(--c-surface-2);
  border:1px solid var(--c-border);
  border-radius:8px;
  font-size:11px;
}
.live-dot{
  width:8px; height:8px; border-radius:50%;
  background:var(--c-success);
  box-shadow:0 0 0 0 var(--c-success);
  animation:pulse 2s infinite;
}
.live-dot.warn{background:var(--c-warning); animation:pulse-warn 2s infinite}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(16,232,158,.6)}70%{box-shadow:0 0 0 8px rgba(16,232,158,0)}100%{box-shadow:0 0 0 0 rgba(16,232,158,0)}}
@keyframes pulse-warn{0%{box-shadow:0 0 0 0 rgba(245,181,68,.6)}70%{box-shadow:0 0 0 8px rgba(245,181,68,0)}100%{box-shadow:0 0 0 0 rgba(245,181,68,0)}}
.live-pill .mono{font-size:11px; color:var(--c-text-2)}

.nav-title{
  font-family:var(--mono);
  font-size:10px;
  text-transform:uppercase;
  letter-spacing:.14em;
  color:var(--c-text-3);
  padding:14px 10px 6px;
}
.nav-item{
  display:flex; align-items:center; gap:11px;
  padding:9px 11px;
  border-radius:7px;
  cursor:pointer;
  color:var(--c-text-2);
  font-size:13px;
  font-weight:500;
  user-select:none;
  position:relative;
  transition:background .15s, color .15s;
}
.nav-item:hover{background:var(--c-surface-2); color:var(--c-text)}
.nav-item.active{
  background:var(--c-primary-soft);
  color:var(--c-primary);
  font-weight:600;
}
.nav-item.active::before{
  content:"";
  position:absolute; left:-14px; top:9px; bottom:9px;
  width:3px;
  background:var(--c-primary);
  border-radius:0 3px 3px 0;
  box-shadow:0 0 12px var(--c-primary-glow);
}
.nav-icon{
  width:16px; height:16px;
  display:inline-flex; align-items:center; justify-content:center;
  color:currentColor;
  opacity:.85;
}
.nav-item .count{
  margin-left:auto;
  font-family:var(--mono);
  font-size:10.5px;
  padding:1px 7px;
  border-radius:99px;
  background:var(--c-surface-3);
  color:var(--c-text-3);
}
.nav-item.active .count{background:var(--c-primary); color:#06080F}

.side-foot{
  margin-top:auto;
  padding-top:14px;
  border-top:1px solid var(--c-border);
  display:flex; flex-direction:column; gap:4px;
}
.side-signoff{
  margin-top:10px;
  padding:10px 10px 4px;
  display:flex; align-items:center; justify-content:space-between;
  font-family:var(--mono);
  font-size:10px;
  color:var(--c-text-3);
  letter-spacing:.04em;
}
.side-signoff .jp{
  display:inline-flex; align-items:center; gap:6px;
  color:var(--c-text-2);
}
.side-signoff .jp-badge{
  display:inline-flex; align-items:center; justify-content:center;
  width:18px; height:18px;
  border-radius:5px;
  background:linear-gradient(135deg, var(--c-violet), var(--c-primary));
  color:#06080F;
  font-size:9px; font-weight:800;
  letter-spacing:0;
  font-family:var(--mono);
  box-shadow:0 0 8px var(--c-primary-glow);
}
.side-signoff .heart{color:var(--c-danger); animation:beat 1.6s ease-in-out infinite}
@keyframes beat{0%,100%{transform:scale(1)}25%{transform:scale(1.18)}50%{transform:scale(1)}}

/* MAIN */
.main{
  padding:22px 28px 60px;
  max-width:1700px;
  width:100%;
  margin:0 auto;
  min-width:0;
}

.topbar{
  display:flex; align-items:center; justify-content:space-between;
  gap:20px;
  padding:6px 0 18px;
  border-bottom:1px solid var(--c-border);
  margin-bottom:22px;
  flex-wrap:wrap;
}
.topbar-left h1{
  margin:0;
  font-size:22px;
  font-weight:700;
  letter-spacing:-.018em;
  display:flex; align-items:center; gap:12px;
}
.topbar-left h1::before{
  content:"";
  width:6px; height:22px;
  background:linear-gradient(180deg, var(--c-primary), var(--c-violet));
  border-radius:2px;
  box-shadow:0 0 14px var(--c-primary-glow);
}
.topbar-sub{
  font-family:var(--mono);
  font-size:11px;
  color:var(--c-text-3);
  margin:6px 0 0 18px;
  letter-spacing:.02em;
}
.topbar-right{
  display:flex; align-items:center; gap:10px;
}
.timestamp{
  display:flex; flex-direction:column; align-items:flex-end;
  font-family:var(--mono);
  font-size:11px;
  color:var(--c-text-3);
  line-height:1.3;
}
.timestamp b{color:var(--c-text); font-weight:600}

/* BUTTONS / INPUTS */
.btn{
  display:inline-flex; align-items:center; justify-content:center; gap:6px;
  padding:8px 13px;
  border-radius:7px;
  border:1px solid var(--c-border);
  background:var(--c-surface);
  color:var(--c-text);
  font-size:12.5px;
  font-weight:500;
  font-family:inherit;
  cursor:pointer;
  transition:all .15s;
  white-space:nowrap;
}
.btn:hover{border-color:var(--c-primary); color:var(--c-primary); box-shadow:0 0 0 1px var(--c-primary-soft)}
.btn-primary{
  background:linear-gradient(180deg, var(--c-primary) 0%, color-mix(in oklab, var(--c-primary) 80%, black) 100%);
  color:#06080F;
  border-color:transparent;
  font-weight:600;
  box-shadow:0 1px 0 rgba(255,255,255,.18) inset, 0 0 14px var(--c-primary-glow);
}
.btn-primary:hover{
  color:#06080F;
  filter:brightness(1.1);
}
.btn-icon{padding:7px; width:32px; height:32px}
.btn-ghost{background:transparent;border-color:transparent;color:var(--c-text-2)}
.btn-ghost:hover{background:var(--c-surface-2); color:var(--c-text); border-color:transparent}

.input, .select{
  padding:8px 12px;
  border-radius:7px;
  border:1px solid var(--c-border);
  background:var(--c-surface);
  color:var(--c-text);
  font-size:12.5px;
  font-family:inherit;
  transition:border-color .15s, box-shadow .15s;
}
.input:focus, .select:focus{
  outline:none;
  border-color:var(--c-primary);
  box-shadow:0 0 0 3px var(--c-primary-soft);
}
.select{padding-right:30px}

/* FILTERS */
.filters{
  display:flex; flex-wrap:wrap;
  gap:10px;
  align-items:end;
  background:var(--c-surface);
  border:1px solid var(--c-border);
  border-radius:var(--r-lg);
  padding:14px;
  margin-bottom:18px;
}
.field{display:flex; flex-direction:column; gap:5px}
.field label{
  font-family:var(--mono);
  font-size:9.5px;
  font-weight:600;
  color:var(--c-text-3);
  text-transform:uppercase;
  letter-spacing:.12em;
}

/* KPI GRID */
.kpi-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit, minmax(220px, 1fr));
  gap:12px;
  margin-bottom:20px;
}
.kpi{
  position:relative;
  background:var(--c-surface);
  border:1px solid var(--c-border);
  border-radius:var(--r-lg);
  padding:14px 16px;
  overflow:hidden;
  transition:border-color .15s, transform .15s;
}
.kpi:hover{border-color:var(--c-border-2)}
.kpi::after{
  content:"";
  position:absolute;
  top:0; right:0;
  width:120px; height:120px;
  background:radial-gradient(circle at top right, var(--c-primary-soft), transparent 70%);
  pointer-events:none;
  opacity:.7;
}
.kpi.k-success::after{background:radial-gradient(circle at top right, var(--c-success-soft), transparent 70%)}
.kpi.k-warning::after{background:radial-gradient(circle at top right, var(--c-warning-soft), transparent 70%)}
.kpi.k-danger::after{background:radial-gradient(circle at top right, var(--c-danger-soft), transparent 70%)}
.kpi.k-violet::after{background:radial-gradient(circle at top right, var(--c-violet-soft), transparent 70%)}
.kpi-head{
  display:flex; align-items:center; justify-content:space-between;
  gap:8px; margin-bottom:8px;
  position:relative; z-index:1;
}
.kpi-label{
  font-family:var(--mono);
  font-size:10px;
  font-weight:600;
  color:var(--c-text-3);
  text-transform:uppercase;
  letter-spacing:.12em;
}
.kpi-chip{
  font-family:var(--mono);
  font-size:10px;
  padding:2px 7px;
  border-radius:99px;
  background:var(--c-surface-2);
  color:var(--c-text-2);
  border:1px solid var(--c-border);
  display:inline-flex; align-items:center; gap:4px;
}
.kpi-chip.up{color:var(--c-success); border-color:var(--c-success-soft); background:var(--c-success-soft)}
.kpi-chip.down{color:var(--c-danger); border-color:var(--c-danger-soft); background:var(--c-danger-soft)}
.kpi-value{
  font-family:var(--mono);
  font-size:30px;
  font-weight:700;
  line-height:1;
  letter-spacing:-.02em;
  color:var(--c-text);
  position:relative; z-index:1;
}
.kpi-value .unit{font-size:14px; color:var(--c-text-3); font-weight:500; margin-left:2px}
.kpi-sub{
  font-size:11px;
  color:var(--c-text-3);
  margin-top:6px;
  position:relative; z-index:1;
  display:flex; align-items:center; gap:6px;
}
.kpi-bar{
  height:3px; border-radius:99px;
  background:var(--c-surface-2);
  margin-top:10px;
  overflow:hidden;
  position:relative; z-index:1;
}
.kpi-bar > span{
  display:block; height:100%;
  background:var(--c-primary);
  box-shadow:0 0 8px var(--c-primary-glow);
  transition:width .4s;
}
.k-success .kpi-bar > span{background:var(--c-success); box-shadow:0 0 8px rgba(16,232,158,.4)}
.k-warning .kpi-bar > span{background:var(--c-warning); box-shadow:0 0 8px rgba(245,181,68,.4)}
.k-danger .kpi-bar > span{background:var(--c-danger); box-shadow:0 0 8px rgba(255,92,122,.4)}
.k-violet .kpi-bar > span{background:var(--c-violet); box-shadow:0 0 8px rgba(167,139,250,.4)}
.kpi-spark{
  margin-top:8px;
  position:relative; z-index:1;
}

/* CARDS */
.card{
  background:var(--c-surface);
  border:1px solid var(--c-border);
  border-radius:var(--r-lg);
  margin-bottom:16px;
  overflow:hidden;
  position:relative;
}
.card-head{
  padding:14px 18px;
  border-bottom:1px solid var(--c-border);
  display:flex; align-items:center; justify-content:space-between;
  gap:12px;
}
.card-head h3{
  margin:0;
  font-size:13.5px;
  font-weight:600;
  letter-spacing:-.005em;
  display:flex; align-items:center; gap:8px;
}
.card-head h3::before{
  content:"";
  width:3px; height:14px;
  background:var(--c-primary);
  border-radius:2px;
  box-shadow:0 0 6px var(--c-primary-glow);
}
.card-head h3.no-bar::before{display:none}
.card-sub{
  font-family:var(--mono);
  font-size:10.5px;
  color:var(--c-text-3);
  letter-spacing:.02em;
}
.card-body{padding:18px}
.card-body.no-pad{padding:0}

/* TABLES */
.tbl{
  width:100%;
  border-collapse:collapse;
}
.tbl th, .tbl td{
  text-align:left;
  padding:10px 18px;
  border-bottom:1px solid var(--c-border);
  font-size:12.5px;
  vertical-align:middle;
}
.tbl th{
  font-family:var(--mono);
  font-weight:600;
  color:var(--c-text-3);
  font-size:10px;
  text-transform:uppercase;
  letter-spacing:.12em;
  background:var(--c-surface-2);
  position:sticky; top:0;
}
.tbl tbody tr{transition:background .12s}
.tbl tbody tr:hover{background:var(--c-surface-2)}
.tbl tbody tr:last-child td{border-bottom:0}
.tbl b{font-weight:600}
.tbl .mono{font-size:12px}

/* BADGES */
.badge{
  display:inline-flex; align-items:center; gap:5px;
  padding:3px 9px;
  border-radius:99px;
  font-size:10.5px;
  font-weight:600;
  letter-spacing:.02em;
  border:1px solid transparent;
  background:var(--c-surface-2);
  color:var(--c-text-2);
}
.badge::before{
  content:""; width:5px; height:5px; border-radius:50%;
  background:currentColor;
  opacity:.85;
}
.badge.no-dot::before{display:none}
.badge-success{background:var(--c-success-soft); color:var(--c-success); border-color:var(--c-success-soft)}
.badge-warning{background:var(--c-warning-soft); color:var(--c-warning); border-color:var(--c-warning-soft)}
.badge-danger{background:var(--c-danger-soft); color:var(--c-danger); border-color:var(--c-danger-soft)}
.badge-primary{background:var(--c-primary-soft); color:var(--c-primary); border-color:var(--c-primary-soft)}
.badge-violet{background:var(--c-violet-soft); color:var(--c-violet); border-color:var(--c-violet-soft)}
.badge-default{background:var(--c-surface-2); color:var(--c-text-2); border-color:var(--c-border)}
.badge-info{background:var(--c-primary-soft); color:var(--c-primary); border-color:var(--c-primary-soft)}
.badge-purple{background:var(--c-violet-soft); color:var(--c-violet); border-color:var(--c-violet-soft)}

/* sections */
.section{display:none; animation:fadeIn .25s ease}
.section.active{display:block}
@keyframes fadeIn{from{opacity:0; transform:translateY(4px)}to{opacity:1; transform:none}}

.empty{padding:40px; text-align:center; color:var(--c-text-3); font-size:12.5px}

/* GRID LAYOUTS */
.row-2{display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-bottom:16px}
.row-3{display:grid; grid-template-columns:2fr 1fr; gap:16px; margin-bottom:16px}
@media (max-width:1100px){.row-2,.row-3{grid-template-columns:1fr}}

/* HEATMAP */
.heatmap{display:grid; gap:3px; padding:8px 4px; overflow-x:auto}
.heatmap-row{display:flex; gap:3px; align-items:center}
.heatmap-label{
  font-family:var(--mono);
  font-size:9.5px;
  color:var(--c-text-3);
  width:96px;
  flex-shrink:0;
  padding-right:8px;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
}
.hm-cell{
  width:16px; height:16px;
  border-radius:3px;
  background:var(--c-surface-3);
  flex-shrink:0;
  position:relative;
  cursor:default;
}
.hm-cell[data-v="0"]{background:var(--c-surface-3); opacity:.6}
.hm-cell[data-v="1"]{background:rgba(34,211,238,.18)}
.hm-cell[data-v="2"]{background:rgba(34,211,238,.38); box-shadow:0 0 4px rgba(34,211,238,.2)}
.hm-cell[data-v="3"]{background:rgba(34,211,238,.62); box-shadow:0 0 6px rgba(34,211,238,.35)}
.hm-cell[data-v="4"]{background:var(--c-primary); box-shadow:0 0 8px var(--c-primary-glow)}
.hm-cell.miss{background:var(--c-danger-soft)}
.hm-cell.licenca{background:var(--c-violet-soft)}
.hm-cell.weekend{background:transparent; border:1px dashed var(--c-border)}
.heatmap-legend{
  display:flex; align-items:center; gap:10px;
  font-family:var(--mono); font-size:10px;
  color:var(--c-text-3);
  padding:8px 8px 0;
}
.heatmap-legend .swatch{display:inline-flex; align-items:center; gap:5px}
.heatmap-legend .swatch i{width:11px; height:11px; border-radius:2px; display:inline-block}

/* ALERTS */
.alert{
  padding:12px 14px;
  border-radius:8px;
  background:var(--c-warning-soft);
  color:var(--c-warning);
  border:1px solid var(--c-warning-soft);
  border-left:3px solid var(--c-warning);
  margin-bottom:14px;
  font-size:12.5px;
  display:flex; gap:10px;
  align-items:flex-start;
}
.alert.info{background:var(--c-primary-soft); color:var(--c-primary); border-color:var(--c-primary-soft); border-left-color:var(--c-primary)}
.alert.danger{background:var(--c-danger-soft); color:var(--c-danger); border-color:var(--c-danger-soft); border-left-color:var(--c-danger)}
.alert.success{background:var(--c-success-soft); color:var(--c-success); border-color:var(--c-success-soft); border-left-color:var(--c-success)}

/* TAXA BAR */
.taxa-cell{display:inline-flex; align-items:center; gap:8px; min-width:140px}
.taxa-bar{
  width:80px; height:5px;
  background:var(--c-surface-3);
  border-radius:99px;
  overflow:hidden;
}
.taxa-bar-fill{height:100%; background:var(--c-danger); transition:width .3s}
.taxa-cell b{font-family:var(--mono); font-size:11.5px; min-width:36px}

/* SPARKLINE inline */
.spark{display:inline-block; vertical-align:middle}

/* RANKING ROW */
.rank-num{
  font-family:var(--mono);
  font-size:11px;
  color:var(--c-text-3);
  font-weight:600;
}
tr:nth-child(1) .rank-num{color:#FFD56E}
tr:nth-child(2) .rank-num{color:#CFD8E3}
tr:nth-child(3) .rank-num{color:#D88A5E}

/* PROJECT CARDS */
.proj-card{
  background:var(--c-surface);
  border:1px solid var(--c-border);
  border-radius:var(--r-lg);
  padding:16px 18px;
  margin-bottom:10px;
  cursor:pointer;
  transition:all .15s;
}
.proj-card:hover{border-color:var(--c-primary); box-shadow:0 0 0 1px var(--c-primary-soft), 0 0 24px rgba(34,211,238,.04)}
.proj-card.expanded{border-color:var(--c-primary); background:linear-gradient(180deg, var(--c-surface) 0%, var(--c-surface-2) 100%)}
.proj-head{display:flex; justify-content:space-between; align-items:flex-start; gap:14px}
.proj-code{
  font-family:var(--mono);
  font-size:14.5px;
  font-weight:700;
  color:var(--c-text);
  letter-spacing:-.01em;
}
.proj-code small{
  font-family:'Inter', sans-serif;
  font-size:12px;
  color:var(--c-text-3);
  font-weight:500;
}
.proj-name{font-size:12px; color:var(--c-text-2); margin-top:3px}
.proj-tags{display:flex; flex-wrap:wrap; gap:5px; margin-top:9px}
.proj-meta{text-align:right; font-size:10.5px; color:var(--c-text-3); white-space:nowrap; font-family:var(--mono)}
.proj-meta b{display:block; color:var(--c-text); font-size:18px; font-weight:700; line-height:1}
.proj-pend{margin-top:14px; padding-top:14px; border-top:1px dashed var(--c-border); display:none}
.proj-card.expanded .proj-pend{display:block}
.proj-pend-grupo{margin-bottom:14px}
.proj-pend-grupo h4{
  margin:0 0 8px;
  font-family:var(--mono);
  font-size:10.5px;
  text-transform:uppercase;
  letter-spacing:.12em;
  color:var(--c-text-3);
}
.proj-pend-item{
  font-size:12px;
  padding:9px 12px;
  background:var(--c-surface-2);
  border-radius:7px;
  margin-bottom:6px;
  border-left:3px solid var(--c-border);
}
.proj-pend-item.has-acao{border-left-color:var(--c-warning)}
.proj-pend-item.concluida{border-left-color:var(--c-success); opacity:.6}
.proj-pend-head{display:flex; justify-content:space-between; gap:8px; margin-bottom:6px}
.proj-pend-toggle{cursor:pointer; font-size:10.5px; color:var(--c-primary); user-select:none; font-weight:600}
.proj-pend-toggle:hover{text-decoration:underline}
.acoes-box{margin-top:8px; padding-top:8px; border-top:1px dashed var(--c-border); display:none}
.proj-pend-item.expanded .acoes-box{display:block}
.acao-item{
  display:flex; align-items:center; gap:6px;
  padding:6px 9px;
  background:var(--c-surface);
  border:1px solid var(--c-border);
  border-radius:6px;
  margin-bottom:5px;
  font-size:11px;
}
.acao-status-btn{
  padding:2px 8px; font-size:9.5px;
  border-radius:99px; border:0; cursor:pointer;
  font-weight:600; letter-spacing:.04em;
  font-family:var(--mono);
}
.acao-add{display:flex; gap:6px; margin-top:7px; flex-wrap:wrap; align-items:center}
.acao-add input{
  flex:1; min-width:140px;
  padding:6px 10px; font-size:11px;
  border:1px solid var(--c-border);
  background:var(--c-surface);
  color:var(--c-text);
  border-radius:6px; font-family:inherit;
}
.acao-add button{
  padding:6px 12px; font-size:11px;
  border:0;
  background:var(--c-primary); color:#06080F;
  border-radius:6px; cursor:pointer; font-weight:600;
}
.proj-pend-info{display:flex; justify-content:space-between; gap:8px; font-size:12px; align-items:flex-start}
.proj-pend-desc{flex:1}

/* EQUIPE CARDS */
.equipe-card{
  background:var(--c-surface);
  border:1px solid var(--c-border);
  border-radius:var(--r-lg);
  padding:14px 16px;
  position:relative;
  overflow:hidden;
}
.equipe-card::before{
  content:"";
  position:absolute; left:0; right:0; top:0; height:3px;
  background:var(--c-primary);
  box-shadow:0 0 10px var(--c-primary-glow);
}
.equipe-card .lead-name{font-size:11px; color:var(--c-text-3); margin-top:2px; font-family:var(--mono)}
.equipe-card .eq-name{font-weight:700; font-size:13.5px; letter-spacing:-.005em}
.compliance-bar{height:5px; background:var(--c-surface-3); border-radius:99px; margin-top:10px; overflow:hidden}
.compliance-bar-fill{height:100%; background:var(--c-success); transition:width .3s}
.equipe-row{
  display:flex; justify-content:space-between; align-items:baseline;
  margin:7px 0; font-size:12px;
}
.equipe-row .v{font-weight:700; font-size:15px; font-family:var(--mono)}

/* EQUIPE MULTI-SELECT DROPDOWN */
.eq-dropdown{position:relative; width:100%}
.eq-dropdown-btn{
  width:100%;
  padding:9px 12px;
  border-radius:7px;
  border:1px solid var(--c-border);
  background:var(--c-surface);
  color:var(--c-text);
  font-size:12.5px; font-weight:500;
  font-family:inherit; cursor:pointer;
  display:flex; align-items:center; justify-content:space-between;
  user-select:none;
  min-height:38px; gap:8px;
}
.eq-dropdown-btn:hover{border-color:var(--c-primary); background:var(--c-surface-2)}
.eq-dropdown-btn.open{border-color:var(--c-primary); border-bottom-color:transparent; border-radius:7px 7px 0 0; z-index:12; position:relative}
.eq-dropdown-btn-icon{font-size:10px; color:var(--c-text-3); transition:transform .2s}
.eq-dropdown-btn.open .eq-dropdown-btn-icon{transform:rotate(180deg); color:var(--c-primary)}
.eq-dropdown-btn > span:first-child{flex:1; min-width:0; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; text-align:left}
.eq-dropdown-menu{
  position:absolute; top:100%; left:0; right:0;
  background:var(--c-surface);
  border:1px solid var(--c-primary);
  border-top:0;
  border-radius:0 0 7px 7px;
  box-shadow:0 12px 24px rgba(0,0,0,.4);
  display:none; flex-direction:column;
  max-height:240px; overflow-y:auto;
  z-index:11; margin-top:-1px;
}
.eq-dropdown-menu.show{display:flex}
.eq-dropdown-item{
  display:flex; align-items:center; gap:10px;
  padding:9px 12px; cursor:pointer;
  border-bottom:1px solid var(--c-border);
  font-size:12.5px;
}
.eq-dropdown-item:last-child{border-bottom:0}
.eq-dropdown-item:hover{background:var(--c-surface-2)}
.eq-dropdown-item input[type="checkbox"]{accent-color:var(--c-primary); width:14px; height:14px}
.eq-dropdown-item label{cursor:pointer; flex:1; margin:0; color:var(--c-text)}

/* MISC */
.page-sub{
  color:var(--c-text-3);
  font-family:var(--mono);
  font-size:11px;
  margin:0 0 18px;
  letter-spacing:.02em;
}
.section-title-row{
  display:flex; align-items:center; justify-content:space-between;
  margin-bottom:14px; gap:14px;
}
.chips-row{display:flex; gap:6px; flex-wrap:wrap}

/* RESPONSIVE */
@media (max-width:880px){
  .app{grid-template-columns:1fr}
  .sidebar{position:relative; height:auto; border-right:0; border-bottom:1px solid var(--c-border)}
  .main{padding:18px}
}

/* SCROLLBARS */
::-webkit-scrollbar{width:10px; height:10px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--c-border); border-radius:5px}
::-webkit-scrollbar-thumb:hover{background:var(--c-border-2)}

/* MODAL */
#gestao-modal .modal-shell{
  position:fixed; inset:0;
  background:rgba(6,8,15,.78);
  backdrop-filter:blur(6px);
  display:flex; align-items:center; justify-content:center;
  z-index:1000;
  padding:20px;
}
#gestao-modal .modal-card{
  background:var(--c-surface);
  color:var(--c-text);
  padding:22px;
  border-radius:12px;
  border:1px solid var(--c-border-2);
  max-width:520px; width:100%;
  box-shadow:0 24px 60px rgba(0,0,0,.6);
}
</style>
</head>

<div class="app">

<aside class="sidebar">

    Visão Geral
  </div>
  <div class="nav-item" data-tab="status">

  </div>
  <div class="nav-item" data-tab="equipe">
    <svg class="nav-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="5" cy="6" r="2.2"/><circle cx="11" cy="6" r="2.2"/><path d="M1.5 13c.5-2 2-3 3.5-3s3 1 3.5 3M7.5 13c.5-2 2-3 3.5-3s3 1 3.5 3"/></svg>

  <div class="side-foot">

    <div class="side-signoff">
      <span>desenvolvido <span class="heart"></span> by</span>
      <span class="jp"><span class="jp-badge">JP</span></span>
    </div>
  </div>
</aside>

<main class="main">
  <header class="topbar">

      <h1 id="pageTitle">Controle RDP — Visão Geral</h1>
      <p class="topbar-sub" id="pageSub">Carregando…</p>

  <section id="section-overview" class="section active"></section>
